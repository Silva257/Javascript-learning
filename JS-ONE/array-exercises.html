<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array exercises</title>
</head>
<body>
    <script>
        const array = [10, 20, 30];
        console.log(array);
        array[array.length - 1] = 99;
        console.log(array);
        array.push(38, 45, 50, 29);
        console.log(array);
        array.pop();
        console.log(array);

        const lastValue = array[array.length - 1] ;
        console.log(lastValue);


        // function swapp first and last values

        function swapValues(array){
            let firstValue = array[0];
            let lastValue = array[array.length - 1];
            array[0] = lastValue;
            array[array.length - 1] = firstValue;
            return array;
        }
        console.log(swapValues([1, 3, 65, 'last value']))
    </script>
</body>
</html>
