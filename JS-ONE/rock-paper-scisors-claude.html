<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock paper scisors</title>
    <link rel="icon" type="image/x-icon" href="images/myicon.ico">

    <style>
        body{
            font-size: 2rem;
        }
        button{
            font-size: 1.5rem;
        }
        .p-one{
            border-bottom: 2px solid;
            width: fit-content;
        }
    </style>
</head>
<body>
    <p class="p-one">Rock Paper Scissors Game</p>

    <button type="button"
     onclick="playGame('rock')">
        Rock
    </button>

    <button type="button"
     onclick="playGame('papers')">
        Paper
    </button>

    <button type="button"
     onclick="playGame('scissors')">
        Scissors
    </button>

    <button type="button" class="js-reset">
      Reset
    </button>

          <!-- paragraph for displaying score -->
      <p class="js-score-paragraph"></p>

    <script>

      let myPick = '';
      let computerMove = '';
      let result = '';

      // Score OBJECT
      let score = JSON.parse(localStorage.getItem('score')) || {
       wins : 0,
        ties : 0,
        losses : 0,
        };

      // calling score paragraph
      const scoreParagraph = document.querySelector('.js-score-paragraph');
      
      // displaying the score on the web (MOVED OUTSIDE playGame!)
      function paragraphDisplay(){
        scoreParagraph.innerHTML = `
        Wins : ${score.wins}; -- Losses : ${score.losses}; -- Ties : ${score.ties}`;
      };
      
      // Display initial score
      paragraphDisplay();

      // reset button
      const resetBtn = document.querySelector('.js-reset');

      resetBtn.addEventListener('click', ()=>{
          // Reset the score object
          score.wins = 0;
          score.ties = 0;
          score.losses = 0;
          
          // Update localStorage
          localStorage.setItem('score', JSON.stringify(score));
          
          // Update display
          paragraphDisplay();
          
          alert('Score reset successfully!');
          console.log('Score reset successfully!');
      })

      // declaring a function..

      function playGame(playerMove){

        myPick = Math.random();
      
      // PICK A COMPUTERMOVE

      if (myPick < 1/3){
        computerMove = 'rock';
      } else if (myPick < 2/3){
        computerMove = 'papers';
      } else if (myPick >= 2/3 && myPick < 1){
        computerMove = 'scissors';
      };

      // DEFINING THE WINNER;

      if (playerMove === computerMove){
        result = 'Tie.';
      } else if (playerMove === 'rock' && computerMove === 'papers' || playerMove === 'papers' && computerMove === 'scissors' || playerMove === 'scissors' && computerMove === 'rock'){
        result = 'You won.';
      } else {
        result = 'You lost.'
      };
      
      // ADDING SCORE RATES.

      if (result === 'Tie.'){
        score.ties += 1;
      } else if (result === 'You won.'){
        score.wins += 1;
      } else if (result === 'You lost.'){
        score.losses += 1;
      }

       alert(`You chose ${playerMove}, Computer chose ${computerMove}, ${result},
Wins : ${score.wins}, Losses : ${score.losses}, Ties : ${score.ties}`);

       console.log(`You chose ${playerMove}, Computer chose ${computerMove}, ${result}
Wins : ${score.wins}, Losses : ${score.losses}, Ties : ${score.ties}`);

      // Update display and storage
      paragraphDisplay();
      localStorage.setItem('score', JSON.stringify(score));
      }
      
      const messages = [
        'welcome back',
        'hope you are ok', 
        'hi',
        'good day'
      ]
      const message = messages[ Math.floor( Math.random() * messages.length)];
      
      console.log(Math.floor(Math.random() * messages.length));

      console.log(message);

    </script>
</body>
</html>
