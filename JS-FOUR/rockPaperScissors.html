<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles/rock-paper-scissors.css">
    <script src="scripts/r-p-s.js" defer></script>
</head>
<body>
    <h2>Rock Paper Scissors Game</h2>

    <!-- PLAYERS BUTTONS -->

    <div class="buttons">
    
        <button type="button" class="rock player" data-name="rock">Rock</button>
        
        <button type="button" class="paper player" data-name="paper">Paper</button>
        
        <button type="button" class="scissors player" data-name="scissors">Scissors</button>
        
    </div>

    <!-- Score && result && players -->

    <p class="resultParagraph"></p>
    <p class="playersParagraph"></p>
    <p class="scoreParagraph"></p>

    <!-- RESET and AUTO-PLAY buttons -->

    <div class="buttons">
         <button class="reset player" type="reset">Reset</button>

        <button class="auto-play player" type="button">Auto-Play</button>
    </div>
   
</body>
</html>
