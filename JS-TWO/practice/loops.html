<body>
    <script>

        const array = ['one','two',3,4,'five',6,7,8,9,10];

        for (let i = 0; i < array.length; i++){

            console.log(`${i + 1} . ${array[i]}`);

        }

        // break and continue

        for (let i = 0; i < 10; i++){

            if ( i === 5 ) continue
            // here it will jump the 5
            if ( i === 7 ) break;
            // if i reaches 7 , will break and doesnt print it

            //console.log(i);
        }

        for (let i = 0; i <= 16; i ++){

            if ( i % 3 === 0 ) continue;
            console.log(i);

        }

        // Making a loop a function

         function doubled(arr1){
        //const arr1 = [];
        const doubledArr1 = [];
        
        for (let i = 0; i < arr1.length; i++){

            if (arr1[i] === 0 ){
                return doubledArr1;
            }

            let doubled = arr1[i] * 2;
            doubledArr1.push(doubled)
            //doubledArr1 =  doubled++;   
        }
        // console.log(doubledArr1);
        return doubledArr1;

         }

        console.log(doubled([1, 3, 5, 0, 45]));
        console.log(doubled([4, 67, 986, 1, 7, 'hello', 25]));

    </script>
</body>
