<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, p, button{
            font-size: 1.3rem;
        }
         .playIcon {
            width: 60px;
            height: 60px;
            margin: 1.5rem;
            display: inline-block;
            padding: 10px;
            background-color: rgb(190, 148, 148);
            border-radius: 50%;
            border: 3px solid;
        }
        .Icon {
            width: 60px;
            height: 60px;
            margin: 1.5rem;
            display: inline-block;
            padding: 10px;
            background-color: rgb(220, 247, 233);
            border-radius: 50%;
            border: 3px solid green;
        }

        .playIcon:hover {
            cursor: pointer;
        }
    </style>
    <title>Rock Paper Scissors</title>
</head>
<body>
    <p>Rock Paper Scissors</p>

    <!-- <button type="button" class="rock">Rock</button> -->

   <img src="images/images/rock-emoji.png"  class="rock playIcon" alt="rock">

    <!-- <button type="button" class="paper playIcon">Paper</button> -->

    <img src="images/images/paper-emoji.png"  class="paper playIcon" alt="paper">

    <!-- <button type="button" class="scissors playIcon">Scissors</button> -->

    <img src="images/images/scissors-emoji.png" class="scissors playIcon" alt="scissors">

    <p class="resultParagraph"></p>

    <p class="pickParagraph"></p>

    <p class="scoreParagraph"></p>

    <button type="button" class="resetButton">Reset</button>
    
     <button type="button" class="autoPlayButton">Auto-Play</button>
