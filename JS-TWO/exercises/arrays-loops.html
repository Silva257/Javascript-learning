        function removeEgg(foods){

            let eggRemoved = [];

                    removedEggs++;
                    continue;
                    

                }

        // unique string
            
         function unique(strings){

            const uniqueString = [];

            for (let i = 0; i < strings.length; i++){

                if (!uniqueString.includes(strings[i])){
                    //continue;
                    uniqueString.push(strings[i]);
                }
                
            }
            return uniqueString;
        }
