<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style>
        button, p, body{
            font-size: 1.2rem; 
        }
    </style>
</head>

<body>
    <h2>Rock Paper Scissors Game</h2>
    <button type="button" class="rock">Rock</button>
    <button type="button" class="paper">Paper</button>
    <button type="button" class="scissors">Scissors</button>

    <p class="resultParagraph"></p>
    <p class="playersParagraph"></p>
    <p class="scoreParagraph"></p>

    <button type="button" class="reset">Reset</button>
    <button type="button" class="autoPlay">Auto-Play</button>

    <script>

       const rockPlayer = document.querySelector('.rock');
       const paperPlayer = document.querySelector('.paper');
       const scissorsPlayer = document.querySelector('.scissors');
       const resultParagraph = document.querySelector('.resultParagraph');
       const playersParagraph = document.querySelector('.playersParagraph');
       const reset = document.querySelector('.reset');
       const autoPlay = document.querySelector('.autoPlay');
       const scoreParagraph = document.querySelector('.scoreParagraph');

       // setting the score object

       const score = JSON.parse(localStorage.getItem('score')) || {
        Wins : 0,
        Losses : 0,
        Ties : 0
       };

       // function get random number()

       let computerMove = '';

       function getRandom(){

        const randomNumber = Math.random();

        // get the playerMove logic

        

        if (randomNumber < 1/3){
            computerMove = 'rock'
        } else if (randomNumber < 2/3){
            computerMove = 'paper'
        } else {
            computerMove = 'scissors'
        }
        return computerMove;
       }

       // DETERMINING THE WINNER AND RESULT

       let playerMove = '';

       function playGame(playerMove){

        // calling the COMPUTERMOVE

        getRandom();

        let result = '';
        
        if (playerMove === computerMove){
            result = 'Tie';
            score.Ties ++;

        } else if (playerMove === 'rock' && computerMove === 'paper' || playerMove === 'paper' && computerMove === 'scissors' || playerMove === 'scissors' && computerMove === 'rock'){
            result = 'You Won';
            score.Wins ++;

        } else {
            result = 'You Lost';
            score.Losses ++
        }

        // RESULT PARAGRAPH

        resultParagraph.innerHTML = `${result}.`;

        // players paragraph

        playersParagraph.innerHTML = `You chose ${playerMove} \n Computer chose ${computerMove}...\n ${result} .`;

        // score paragraph

        scoreParagraph.innerHTML = `Wins : ${score.Wins} ✡ Losses :${score.Losses} ✡ Ties : ${score.Ties}`;

        // local storage : score

        localStorage.setItem('score', JSON.stringify(score));

       }

       // add event Listeners

       rockPlayer.addEventListener('click', ()=>{
        playGame('rock');
       });
       paperPlayer.addEventListener('click', ()=>{
        playGame('paper')
       });
       scissorsPlayer.addEventListener('click', ()=>{
        playGame('scissors')
       });

       // reset score
       ///////////////

       reset.addEventListener('click', ()=>{
        score.Losses = 0;
        score.Wins = 0;
        score.Ties = 0;

        // updating the score paragraph 

        scoreParagraph.innerHTML = `Wins : ${score.Wins} ✡ Losses :${score.Losses} ✡ Ties : ${score.Ties}`;

        // updating the rusult; score and players paragraph

        resultParagraph.innerHTML = '';
        playersParagraph.innerHTML = '';
        scoreParagraph.innerHTML = '';

        // update the local storage

        localStorage.setItem('score', JSON.stringify(score));

       }); // end reset

       // Auto Play functionality

       let autoPlayGameInterval = null;

       function autoPlayGame(){

        if (!autoPlayGameInterval){
        autoPlayGameInterval = setInterval(() => {
            let playerMove = getRandom();
            playGame(playerMove);
        }, 1000);
        } else {
            clearInterval(autoPlayGameInterval);
            autoPlayGameInterval = null;

              // updating the rusult; score and players paragraph

            resultParagraph.innerHTML = '';
            playersParagraph.innerHTML = '';
            scoreParagraph.innerHTML = '';
        }
        }

       
    autoPlay.addEventListener('click', autoPlayGame);

    </script>

</body>
</html>
