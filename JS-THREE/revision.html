    // Q19 .
    const increase = document.getElementById('increment');
    const decrease = document.getElementById('decrement');
    const count = document.getElementById('count');

    let myCount = Number(localStorage.getItem('saved')) || 0;
    count.innerHTML = myCount;
    increase.addEventListener('click', ()=>{
        myCount += 1;
        count.innerHTML = myCount;
        localStorage.setItem('saved', myCount)
    });

    decrease.addEventListener('click', ()=>{
        if (myCount === 0){
            return
        }else{
        myCount -= 1;
        count.innerHTML = myCount;
        localStorage.setItem('saved', myCount)
        }
    })
