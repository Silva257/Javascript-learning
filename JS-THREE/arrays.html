<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arrays</title>
</head>
<body>
    <h2>Arrays self-revision</h2>
    <script>
        const numbers = [43, -1, -3, -23, 0, 3, 'SILVA', 87, 987, 12];

        // some methods
        console.log(numbers);

        console.log(numbers.map(num => num + 2));
        console.log(numbers.forEach(num => console.log(num)));
        console.log(numbers.sort((a, b) => a - b));
        console.log(numbers.filter(num => num <= 0));
        console.log(numbers.reverse(num => console.log(num)));
        console.log(numbers.find(num => num === 'SILVA'));

        numbers.push(257);
        console.log(numbers);

        numbers.splice(2, 2);
        console.log(numbers);

        numbers.pop();
        console.log(numbers);
    </script>
</body>
</html>
